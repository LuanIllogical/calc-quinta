<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Quinta-Feira</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="box">

        <div id="auth">
            <h3>Login / Registrar</h3>
            <input id="user" placeholder="Nome de usuário">
            <input id="pass" type="password" placeholder="Senha">

            <button onclick="register()">Registrar</button>
            <button onclick="login()">Login</button>
        </div>

        <div id="app" style="display:none">


            <div class="calc">
                <input class="result" id="display" readonly>
                <div class="grid">
                    <button onclick="add('7')">7</button>
                    <button onclick="add('8')">8</button>
                    <button onclick="add('9')">9</button>
                    <button onclick="add('/')">/</button>

                    <button onclick="add('4')">4</button>
                    <button onclick="add('5')">5</button>
                    <button onclick="add('6')">6</button>
                    <button onclick="add('*')">*</button>

                    <button onclick="add('1')">1</button>
                    <button onclick="add('2')">2</button>
                    <button onclick="add('3')">3</button>
                    <button onclick="add('-')">-</button>

                    <button onclick="add('0')">0</button>
                    <button onclick="add('.')">.</button>
                    <button onclick="clearD()">C</button>
                    <button onclick="add('+')">+</button>
                </div>

                <button onclick="calc()">=</button>
            </div>
            <h4>History</h4>
            <div id="historydiv" class="history-div"></div>

            <button onclick="logout()">Sair</button>
        </div>

    </div>

    <script src="app.js"></script>
</body>

</html>
